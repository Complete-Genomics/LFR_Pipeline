name: lfr_pipeline
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Keep Python 3.6 for compatibility with the legacy Snakemake and analysis
  # scripts. Conflicting Python libraries from the old SnakeMake, General3, and
  # gcbias environments are resolved toward the newer General3 pins where
  # possible.
  - python=3.6
  - pip
  - setuptools
  - wheel

  # Workflow engine
  - snakemake=5.3
  - appdirs
  - configargparse
  - datrie
  - docutils
  - gitpython
  - graphviz
  - jinja2
  - jsonschema
  - networkx
  - psutil
  - pyyaml
  - ratelimiter
  - requests
  - wrapt
  - yappi

  # Python analysis stack
  - biopython=1.76
  - matplotlib=3.1
  - numpy=1.17
  - pandas=0.25
  - pillow
  - plotly
  - pysam=0.15
  - python-dateutil=2.8
  - pytz
  - redis
  - scikit-learn=0.20
  - scipy=1.3
  - seaborn=0.9
  - setproctitle
  - six
  - xgboost

  # Pipeline command-line tools listed in tools.txt.
  - gatk4=4.1.2.0
  - bcftools
  - hapcut2=1.3
  - rtg-tools=3.8.4
  - samtools
  - bwa=0.7.17

  # Additional tools called directly by rules/scripts.
  - bbmap
  - bedtools
  - hisat2
  - htslib
  - megahit
  - minimap2
  - openjdk=8
  - pigz
  - quast=5.0
  - r-base
  - spades=3.14
  - star
  - stringtie
  - subread

  # Legacy/optional dependencies present in the original environments.
  - click
  - cloudpickle
  - colorama
  - decorator
  - docopt
  - filelock
  - more-itertools
  - packaging
  - protobuf
  - pyparsing
  - pytest
  - zipp

  - pip:
      - extremevariantfilter==0.0a4
      - modin==0.6.2
